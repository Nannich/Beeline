input_settings:
  input_dir: "inputs/scRNA-Seq"
  
  datasets:
    - dataset_id: "mHSC-E-500/mHSC-E-500-CellType"
      nickname: "mHSC-E (Cell-Type)"
      groundTruthNetwork: "mHSC-E-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-E-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mHSC-L-500/mHSC-L-500-CellType"
      nickname: "mHSC-L (Cell-Type)"
      groundTruthNetwork: "mHSC-L-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-L-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mHSC-GM-500/mHSC-GM-500-CellType"
      nickname: "mHSC-GM (Cell-Type)"
      groundTruthNetwork: "mHSC-GM-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-GM-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

  algorithms:
    - algorithm_id: "LAGKAN"
      image: "local"
      should_run: [true]
      params:
        dt: [0.08]
        epochs: [200]
        lamb_l1: [0.02]

output_settings:
  output_dir: "outputs/scRNA-Seq"