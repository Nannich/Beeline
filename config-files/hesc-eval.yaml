input_settings:
  input_dir: "inputs/scRNA-Seq"
  
  datasets:
    - dataset_id: "hESC-500-STRING"
      nickname: "hESC (STRING)"
      groundTruthNetwork: "hESC-500-STRING-network.csv"
      runs:
        - run_id: "."
          exprData: "hESC-500-STRING-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "hESC-500-NonSpecific"
      nickname: "hESC (Non-Specific)"
      groundTruthNetwork: "hESC-500-NonSpecific-network.csv"
      runs:
        - run_id: "."
          exprData: "hESC-500-NonSpecific-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "hESC-500-CellType"
      nickname: "hESC (Cell-Type)"
      groundTruthNetwork: "hESC-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "hESC-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

  algorithms:
    - algorithm_id: "LAGKAN"
      image: "local"
      should_run: [true]
      params:
        dt: [0.08]
        epochs: [140]
        lamb_l1: [0.02]

output_settings:
  output_dir: "outputs/scRNA-Seq"