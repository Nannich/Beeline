input_settings:
  input_dir: "inputs/scRNA-Seq"
  
  datasets:
    - dataset_id: "hESC"
      nickname: "hESC-500"
      groundTruthNetwork: "hESC-500-network.csv"
      runs:
        - run_id: "."
          exprData: "hESC-500-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

  algorithms:
    - algorithm_id: "LAGKAN"
      image: "local"
      should_run: [true]
      params:
        dt: [0.08]
        epochs: [140]
        lamb_l1: [0.02]

output_settings:
  output_dir: "outputs/scRNA-Seq"