              - run_id: "dyn-TF-2000/dyn-TF-2000-7"
              - run_id: "dyn-TF-2000/dyn-TF-2000-8"
              - run_id: "dyn-TF-2000/dyn-TF-2000-9"
              - run_id: "dyn-TF-2000/dyn-TF-2000-10"

    algorithms:
        - algorithm_id: "LAGKAN"
          image: "local"
          should_run: [true]
          params:
              epochs: [400]
              lr: [0.01]
              lamb_l1: [0.02]
        
        - algorithm_id: "GENIE3"
          image: "grnbeeline/arboreto:base"
          should_run: [true]

        - algorithm_id: "GRNBOOST2"
          image: "grnbeeline/arboreto:base"
          should_run: [true]

        - algorithm_id: "SCODE"
          image: "grnbeeline/scode:base"
          should_run: [true]
          params:
              z: [10]
              nIter: [1000]
              nRep: [6]

        - algorithm_id: "SINCERITIES"
          image: "grnbeeline/sincerities:base"
          should_run: [true]
          params:
              nBins: [10]

        - algorithm_id: "LEAP"
          image: "grnbeeline/leap:base"
          should_run: [true]
          params:
              maxLag: [0.33]

        - algorithm_id: "GRNVBEM"
          image: "grnbeeline/grnvbem:base"
          should_run: [true]

        - algorithm_id: "PIDC"
          image: "grnbeeline/pidc:base"
          should_run: [true]

        - algorithm_id: "SCRIBE"
          image: "grnbeeline/scribe:base"
          should_run: [true]
          params:
              delay: ["5"]
              method: ['ucRDI']
              lowerDetectionLimit: [0]
              expressionFamily: ['uninormal']
              log: [False]
              ignorePT: [True]

        - algorithm_id: "PPCOR"
          image: "grnbeeline/ppcor:base"
          should_run: [true]
          params:
              pVal: [0.01]

        - algorithm_id: "PEARSON"
          image: "local"
          should_run: [true]

        - algorithm_id: "SINGE"
          image: "grnbeeline/singe:0.4.1"
          should_run: [true]
          params:
              lambda: [0.01]
              dT: [15]
              num_lags: [5]
              kernel_width: [0.5]
              prob_zero_removal: [0]
              prob_remove_samples: [0.0]
              family: ["gaussian"]
              num_replicates: [6]

        - algorithm_id: "GRISLI"
          image: "grnbeeline/grisli:base"
          should_run: [true]
          params:
              L: [10]
              R: [3000]
              alphaMin: [0.0]

        - algorithm_id: "SCSGL"
          image: "scsgl:base"
          should_run: [true]
          params:
              pos_density: [0.45]
              neg_density: [0.45]
              assoc: ["correlation"]

        - algorithm_id: SCKAN
          image: grnbeeline/sckan:latest
          should_run: [True]

output_settings:
    output_dir: "outputs"