input_settings:
  input_dir: "inputs/scRNA-Seq"
  
  datasets:
    - dataset_id: "hESC-500-CellType"
      nickname: "hESC"
      groundTruthNetwork: "hESC-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "hESC-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "hHep-500-CellType"
      nickname: "hHep"
      groundTruthNetwork: "hHep-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "hHep-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mESC-500-CellType"
      nickname: "mESC"
      groundTruthNetwork: "mESC-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mESC-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mHSC-E-500-CellType"
      nickname: "mHSC-E"
      groundTruthNetwork: "mHSC-E-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-E-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mHSC-L-500-CellType"
      nickname: "mHSC-L"
      groundTruthNetwork: "mHSC-L-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-L-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

    - dataset_id: "mHSC-GM-500-CellType"
      nickname: "mHSC-GM"
      groundTruthNetwork: "mHSC-GM-500-CellType-network.csv"
      runs:
        - run_id: "."
          exprData: "mHSC-GM-500-CellType-ExpressionData.csv"
          pseudoTimeData: "PseudoTime.csv"

  algorithms:
    - algorithm_id: "LAGKAN"
      image: "local"
      should_run: [true]
      params:
        dt: [0.08]
        epochs: [200]
        lamb_l1: [0.02]

output_settings:
  output_dir: "outputs/scRNA-Seq"